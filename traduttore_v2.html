<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>Traduttore</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:       #f7f5f2;
  --bg2:      #ffffff;
  --bg3:      #eeebe6;
  --border:   #ddd9d3;
  --text:     #1c1a17;
  --text2:    #6b6660;
  --text3:    #9e9a95;
  --blue:     #2b5fd9;
  --blue-bg:  #eef2fc;
  --green:    #1a7a4a;
  --green-bg: #edf7f2;
  --amber:    #a05c10;
  --amber-bg: #fdf3e7;
  --red:      #c0392b;
}

*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
html { height:100%; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  -webkit-tap-highlight-color: transparent;
}

/* ── SETUP ── */
#setupScreen {
  position:fixed; inset:0; background:var(--bg);
  display:flex; align-items:center; justify-content:center;
  z-index:999; padding:1.5rem;
}
.setup-box {
  width:100%; max-width:380px;
  background:var(--bg2); border:1px solid var(--border);
  border-radius:18px; padding:1.75rem 1.5rem;
  box-shadow: 0 4px 24px rgba(0,0,0,.07);
}
.setup-box h1 {
  font-family:'Crimson Pro',serif;
  font-size:1.5rem; color:var(--text);
  margin-bottom:.25rem; letter-spacing:-.01em;
}
.setup-box p {
  font-size:.82rem; color:var(--text2);
  margin-bottom:1.25rem; line-height:1.6;
}
.setup-box input {
  margin-bottom:.75rem;
}

/* ── HEADER ── */
header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: .8rem 1rem;
  padding-top: max(.8rem, env(safe-area-inset-top));
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.app-name {
  font-family: 'Crimson Pro', serif;
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.01em;
}
.app-name span { color: var(--blue); }
#settingsBtn {
  background: none; border: none; cursor: pointer;
  font-size: 1.1rem; color: var(--text3); padding: .25rem;
}

/* ── MAIN ── */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 1rem;
  gap: .75rem;
  max-width: 640px;
  width: 100%;
  margin: 0 auto;
}

/* ── INPUT AREA ── */
.input-card {
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: .55rem .85rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg3);
}
.card-label {
  font-family: 'DM Mono', monospace;
  font-size: .68rem;
  font-weight: 500;
  color: var(--text3);
  letter-spacing: .08em;
  text-transform: uppercase;
}
.lang-badge {
  font-family: 'DM Mono', monospace;
  font-size: .68rem;
  font-weight: 500;
  padding: .2rem .55rem;
  border-radius: 20px;
  background: var(--blue-bg);
  color: var(--blue);
}

#inputText {
  width: 100%;
  min-height: 110px;
  padding: .85rem;
  font-family: 'Crimson Pro', serif;
  font-size: 1.08rem;
  line-height: 1.6;
  color: var(--text);
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  -webkit-appearance: none;
}
#inputText::placeholder { color: var(--text3); }

.input-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: .5rem .85rem;
  border-top: 1px solid var(--border);
}
.char-count {
  font-family: 'DM Mono', monospace;
  font-size: .68rem;
  color: var(--text3);
}
.btn-clear {
  font-size: .75rem;
  color: var(--text3);
  background: none;
  border: none;
  cursor: pointer;
  padding: .2rem .4rem;
  border-radius: 6px;
}
.btn-clear:active { background: var(--bg3); }

/* ── TRANSLATE BUTTON ── */
.btn-translate {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .5rem;
  width: 100%;
  padding: .85rem;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: .95rem;
  font-weight: 500;
  cursor: pointer;
  transition: background .15s, transform .1s;
  -webkit-tap-highlight-color: transparent;
}
.btn-translate:active { transform: scale(.98); background: #1e4bbf; }
.btn-translate:disabled { background: var(--border); color: var(--text3); }

/* spinner inside button */
.btn-spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.4);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .65s linear infinite;
  display: none;
}
.btn-translate.loading .btn-spinner { display: block; }
.btn-translate.loading .btn-label { opacity: .6; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── RESULT CARD ── */
#resultCard {
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
  display: none;
  animation: fadeUp .25s ease;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}

/* translation main */
.result-main {
  padding: .85rem;
}
#translationText {
  font-family: 'Crimson Pro', serif;
  font-size: 1.12rem;
  line-height: 1.65;
  color: var(--text);
}

/* word details */
#wordDetails {
  display: none;
  border-top: 1px solid var(--border);
  padding: .75rem .85rem;
  display: none;
  flex-direction: column;
  gap: .5rem;
}

.detail-row {
  display: flex;
  gap: .6rem;
  align-items: baseline;
  flex-wrap: wrap;
}
.detail-tag {
  font-family: 'DM Mono', monospace;
  font-size: .65rem;
  font-weight: 500;
  letter-spacing: .07em;
  text-transform: uppercase;
  white-space: nowrap;
  padding: .18rem .5rem;
  border-radius: 5px;
  flex-shrink: 0;
}
.tag-type    { background: var(--blue-bg);   color: var(--blue);  }
.tag-alt     { background: var(--bg3);        color: var(--text2); }
.tag-register{ background: var(--amber-bg);   color: var(--amber); }
.tag-note    { background: var(--green-bg);   color: var(--green); }

.detail-val {
  font-size: .88rem;
  color: var(--text2);
  line-height: 1.5;
}

/* result footer */
.result-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: .5rem .85rem;
  border-top: 1px solid var(--border);
  background: var(--bg3);
}
.detected-lang {
  font-family: 'DM Mono', monospace;
  font-size: .68rem;
  color: var(--text3);
}
.btn-copy {
  display: flex;
  align-items: center;
  gap: .35rem;
  font-family: 'DM Sans', sans-serif;
  font-size: .78rem;
  font-weight: 500;
  color: var(--blue);
  background: var(--blue-bg);
  border: none;
  border-radius: 8px;
  padding: .35rem .75rem;
  cursor: pointer;
  transition: background .15s;
}
.btn-copy:active { background: #d8e4fa; }
.btn-copy.copied { color: var(--green); background: var(--green-bg); }

/* ── HISTORY ── */
#historySection {
  display: none;
}
.history-label {
  font-family: 'DM Mono', monospace;
  font-size: .65rem;
  color: var(--text3);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: .4rem;
  padding: 0 .1rem;
}
.history-list {
  display: flex;
  flex-direction: column;
  gap: .4rem;
}
.history-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: .6rem .85rem;
  cursor: pointer;
  transition: border-color .15s;
}
.history-item:active { border-color: var(--blue); }
.hi-original {
  font-family: 'Crimson Pro', serif;
  font-size: .92rem;
  color: var(--text2);
  margin-bottom: .15rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.hi-translation {
  font-size: .88rem;
  color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── SETTINGS SHEET ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.4);
  backdrop-filter: blur(4px);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 500;
  animation: fadeIn .18s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.sheet {
  background: var(--bg2);
  border-radius: 22px 22px 0 0;
  padding: 1.5rem 1.25rem;
  padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
  width: 100%; max-width: 640px;
  animation: slideUp .25s cubic-bezier(.32,1,.4,1);
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.sheet-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--border); margin: 0 auto 1.25rem;
}
.sheet h2 {
  font-family: 'Crimson Pro', serif;
  font-size: 1.15rem; font-weight: 600;
  margin-bottom: 1rem;
}
.sheet-label {
  font-family: 'DM Mono', monospace;
  font-size: .68rem; color: var(--text3);
  letter-spacing: .07em; text-transform: uppercase;
  margin-bottom: .4rem; display: block;
}

/* ── SHARED ── */
input[type=text], input[type=password] {
  width: 100%;
  background: var(--bg3);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: .65rem .85rem;
  font-family: 'DM Sans', sans-serif;
  font-size: .9rem;
  color: var(--text);
  outline: none;
  -webkit-appearance: none;
  transition: border-color .18s;
}
input:focus { border-color: var(--blue); }

.btn-primary {
  width: 100%;
  padding: .75rem;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: .92rem;
  font-weight: 500;
  cursor: pointer;
  margin-top: .5rem;
}
.btn-secondary {
  width: 100%;
  padding: .7rem;
  background: transparent;
  color: var(--text2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: .88rem;
  cursor: pointer;
  margin-top: .5rem;
}


/* ── ERROR PANEL ── */
#errorPanel {
  display: none;
  background: #fdf0f0;
  border: 1.5px solid #f0b8b8;
  border-radius: 12px;
  padding: .85rem 1rem;
  font-size: .84rem;
  color: var(--red);
  line-height: 1.6;
  word-break: break-all;
}
#errorPanel strong { display: block; margin-bottom: .25rem; font-size: .78rem; letter-spacing: .04em; text-transform: uppercase; }

/* toast */
#toast {
  position: fixed;
  bottom: 5rem;
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--text);
  color: #fff;
  padding: .5rem 1.1rem;
  border-radius: 20px;
  font-size: .8rem;
  font-family: 'DM Sans', sans-serif;
  opacity: 0;
  transition: opacity .2s, transform .2s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 999;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<!-- TOAST -->
<div id="toast"></div>

<!-- SETUP -->
<div id="setupScreen">
  <div class="setup-box">
    <h1>Traduttore</h1>
    <p>Inserisci la tua API key Anthropic. Viene salvata solo su questo dispositivo.</p>
    <input type="password" id="setupKey" placeholder="sk-ant-…"
      autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button class="btn-primary" onclick="saveKey()">Inizia →</button>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="app-name">Tradu<span>ttore</span></div>
  <button id="settingsBtn" onclick="openSettings()">⚙️</button>
</header>

<!-- MAIN -->
<main>

  <!-- INPUT -->
  <div class="input-card">
    <div class="card-header">
      <span class="card-label">Testo originale</span>
      <span class="lang-badge" id="inputLangBadge">→ IT</span>
    </div>
    <textarea id="inputText" placeholder="Incolla qui il testo da tradurre…"
      oninput="onInput()" rows="5"></textarea>
    <div class="input-footer">
      <span class="char-count"><span id="charCount">0</span> caratteri</span>
      <button class="btn-clear" onclick="clearAll()">✕ Cancella</button>
    </div>
  </div>

  <!-- TRANSLATE -->
  <button class="btn-translate" id="translateBtn" onclick="translate()" disabled>
    <div class="btn-spinner"></div>
    <span class="btn-label">Traduci</span>
  </button>

  <!-- RESULT -->
  <div id="resultCard">
    <div class="result-main">
      <div id="translationText"></div>
    </div>
    <div id="wordDetails"></div>
    <div class="result-footer">
      <span class="detected-lang" id="detectedLang"></span>
      <button class="btn-copy" id="copyBtn" onclick="copyTranslation()">
        📋 Copia
      </button>
    </div>
  </div>


  <!-- ERROR -->
  <div id="errorPanel">
    <strong>Errore</strong>
    <span id="errorMsg"></span>
  </div>

  <!-- HISTORY -->
  <div id="historySection">
    <div class="history-label">Recenti</div>
    <div class="history-list" id="historyList"></div>
  </div>

</main>

<!-- SETTINGS -->
<div class="overlay" id="settingsOverlay" style="display:none" onclick="closeSettings(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <h2>Impostazioni</h2>
    <span class="sheet-label">API Key Anthropic</span>
    <input type="password" id="settingsKey" placeholder="sk-ant-…"
      autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button class="btn-primary" onclick="updateKey()">Salva</button>
    <button class="btn-secondary" onclick="closeSettings()">Chiudi</button>
  </div>
</div>

<script>
/* ══════ STORAGE ══════ */
function getKey() { return localStorage.getItem('t_apikey') || ''; }
function saveKey() {
  const k = document.getElementById('setupKey').value.trim();
  if (!k.startsWith('sk-')) { showToast('Chiave non valida'); return; }
  localStorage.setItem('t_apikey', k);
  document.getElementById('setupScreen').style.display = 'none';
}
function updateKey() {
  const k = document.getElementById('settingsKey').value.trim();
  if (k) { localStorage.setItem('t_apikey', k); showToast('Chiave salvata'); }
  closeSettings();
}

/* ══════ HISTORY ══════ */
let history = JSON.parse(localStorage.getItem('t_history') || '[]');
function saveHistory(original, translation) {
  history.unshift({ original, translation, ts: Date.now() });
  if (history.length > 12) history = history.slice(0, 12);
  localStorage.setItem('t_history', JSON.stringify(history));
  renderHistory();
}
function renderHistory() {
  const section = document.getElementById('historySection');
  const list    = document.getElementById('historyList');
  if (history.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = history.map((h,i) => `
    <div class="history-item" onclick="loadHistory(${i})">
      <div class="hi-original">${escHtml(h.original)}</div>
      <div class="hi-translation">${escHtml(firstLine(h.translation))}</div>
    </div>
  `).join('');
}
function loadHistory(i) {
  const h = history[i];
  document.getElementById('inputText').value = h.original;
  onInput();
  showResult(h.translation, h.original);
}
function firstLine(s) { return s.split('\n')[0]; }

/* ══════ INPUT ══════ */
function onInput() {
  const val = document.getElementById('inputText').value;
  document.getElementById('charCount').textContent = val.length;
  document.getElementById('translateBtn').disabled = val.trim().length === 0;
}

function clearAll() {
  document.getElementById('inputText').value = '';
  document.getElementById('charCount').textContent = '0';
  document.getElementById('translateBtn').disabled = true;
  document.getElementById('resultCard').style.display = 'none';
}

/* ══════ TRANSLATE ══════ */
async function translate() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) return;
  const key = getKey();
  if (!key) { showToast('Imposta la API key in ⚙️'); return; }

  // UI: loading
  const btn = document.getElementById('translateBtn');
  btn.classList.add('loading');
  btn.disabled = true;
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('errorPanel').style.display = 'none';

  const isWord = text.trim().split(/\s+/).length === 1;

  const systemPrompt = isWord
    ? `Sei un dizionario italiano preciso e compatto. L'utente ti manda una parola in lingua straniera (quasi sempre inglese, ma rilevi tu la lingua).
Rispondi SOLO con JSON valido, nessun testo extra, nessun backtick.
Formato:
{
  "lang": "en",
  "translation": "traduzione principale in italiano",
  "type": "sostantivo / verbo / aggettivo / avverbio / ecc.",
  "alternatives": "altre traduzioni separate da virgola, o stringa vuota",
  "register": "registro: standard / formale / colloquiale / gergale / tecnico / letterario — o stringa vuota se standard comune",
  "note": "nota breve SOLO se la parola è rara, inusuale, gergale, tecnica, o ha sfumature importanti — altrimenti stringa vuota"
}`
    : `Sei un traduttore professionale. L'utente ti manda un testo in lingua straniera (quasi sempre inglese, ma rilevi tu la lingua).
Rispondi SOLO con JSON valido, nessun testo extra, nessun backtick.
Formato:
{
  "lang": "en",
  "translation": "traduzione in italiano fluente e naturale",
  "note": "breve nota SOLO se c'è un'espressione idiomatica, un riferimento culturale rilevante, o un termine tecnico — altrimenti stringa vuota"
}`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 400,
        system: systemPrompt,
        messages: [{ role: 'user', content: text }]
      })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(()=>({error:{message:resp.statusText}}));
      throw new Error(err?.error?.message || resp.statusText);
    }

    const data = await resp.json();
    const raw  = data.content?.[0]?.text || '{}';
    let parsed;
    try { parsed = JSON.parse(raw.trim()); }
    catch(e) { parsed = { translation: raw, lang: '?' }; }

    showResult(parsed, text, isWord);
    saveHistory(text, parsed.translation || raw);

  } catch(err) {
    const msg = err.message || 'Errore sconosciuto';
    showToast('Errore: ' + msg);
    document.getElementById('errorMsg').textContent = msg;
    document.getElementById('errorPanel').style.display = 'block';
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

/* ══════ SHOW RESULT ══════ */
function showResult(parsed, original, isWord) {
  // Accept either object (fresh) or string (from history)
  let translation, lang, type_, alternatives, register, note;
  if (typeof parsed === 'string') {
    translation = parsed; lang = ''; type_ = ''; alternatives = ''; register = ''; note = '';
  } else {
    translation  = parsed.translation  || '';
    lang         = parsed.lang         || '';
    type_        = parsed.type         || '';
    alternatives = parsed.alternatives || '';
    register     = parsed.register     || '';
    note         = parsed.note         || '';
  }

  document.getElementById('translationText').textContent = translation;

  // Word details
  const details = document.getElementById('wordDetails');
  const isWordMode = isWord !== undefined ? isWord : (original && original.trim().split(/\s+/).length === 1);
  const rows = [];

  if (isWordMode) {
    if (type_)         rows.push(`<div class="detail-row"><span class="detail-tag tag-type">${escHtml(type_)}</span></div>`);
    if (alternatives)  rows.push(`<div class="detail-row"><span class="detail-tag tag-alt">Alt.</span><span class="detail-val">${escHtml(alternatives)}</span></div>`);
    if (register)      rows.push(`<div class="detail-row"><span class="detail-tag tag-register">Registro</span><span class="detail-val">${escHtml(register)}</span></div>`);
  }
  if (note) rows.push(`<div class="detail-row"><span class="detail-tag tag-note">Nota</span><span class="detail-val">${escHtml(note)}</span></div>`);

  if (rows.length > 0) {
    details.innerHTML = rows.join('');
    details.style.display = 'flex';
  } else {
    details.style.display = 'none';
  }

  // Lang badge
  const langNames = { en:'Inglese', fr:'Francese', de:'Tedesco', es:'Spagnolo', pt:'Portoghese', ar:'Arabo', zh:'Cinese', ja:'Giapponese', ru:'Russo' };
  document.getElementById('detectedLang').textContent = lang ? (langNames[lang] || lang.toUpperCase()) : '';

  // Input badge
  document.getElementById('inputLangBadge').textContent = lang ? (lang.toUpperCase() + ' → IT') : '→ IT';

  document.getElementById('resultCard').style.display = 'block';
  document.getElementById('copyBtn').classList.remove('copied');
  document.getElementById('copyBtn').textContent = '📋 Copia';
}

/* ══════ COPY ══════ */
function copyTranslation() {
  const text = document.getElementById('translationText').textContent;
  if (!text) return;
  const btn = document.getElementById('copyBtn');
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓ Copiato';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '📋 Copia'; btn.classList.remove('copied'); }, 2000);
    });
  } else {
    const el = document.createElement('textarea');
    el.value = text; document.body.appendChild(el); el.select();
    document.execCommand('copy'); document.body.removeChild(el);
    btn.textContent = '✓ Copiato'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copia'; btn.classList.remove('copied'); }, 2000);
  }
}

/* ══════ SETTINGS ══════ */
function openSettings() {
  document.getElementById('settingsKey').value = getKey();
  document.getElementById('settingsOverlay').style.display = 'flex';
}
function closeSettings(e) {
  if (!e || e.target === document.getElementById('settingsOverlay'))
    document.getElementById('settingsOverlay').style.display = 'none';
}

/* ══════ TOAST ══════ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

/* ══════ UTILS ══════ */
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ══════ INIT ══════ */
if (getKey()) document.getElementById('setupScreen').style.display = 'none';
renderHistory();

// Enter key on textarea = translate (Cmd+Enter or Ctrl+Enter)
document.getElementById('inputText').addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); translate(); }
});
</script>
